<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A minha Lista</title>
    <script>
        const VERSAO_ATUAL = '3.2'; 
        if (localStorage.getItem('app_version') !== VERSAO_ATUAL) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
            localStorage.setItem('app_version', VERSAO_ATUAL);
            console.log('Cache limpa para v' + VERSAO_ATUAL);
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.2/css/all.min.css">
    <link rel="stylesheet" href="style-v2.css?v=3.2">
    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="img/appLogo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div id="splash-screen">
        <img src="img/loading.png" alt="A carregar..." class="splash-full-image">
    </div>

    <div class="app-container">
        <header>
            <h2><i class="fas fa-cart-shopping"></i> A minha Lista</h2>
        </header>

        <div class="global-actions">
            <button class="share-all-btn" onclick="partilharTudo()">
                <i class="fas fa-share-nodes"></i> Partilhar todas as listas
            </button>
        </div>
        
        <div id="folheto-conteudo"></div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-trash-can warning-icon"></i>
            <h3></h3>
            <p></p> 
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="fecharModal()">Não</button>
                <button class="btn-confirm" onclick="confirmarAcao()">Sim</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="app-v2.js?v=3.2"></script>
</body>
</html>
