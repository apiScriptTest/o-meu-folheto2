<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A minha Lista</title>
    <script>
        const VERSAO_ATUAL = '0.0.5'; // Subimos para v0.0.5
        if (localStorage.getItem('app_version') !== VERSAO_ATUAL) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
            localStorage.setItem('app_version', VERSAO_ATUAL);
            console.log('Cache limpa para v' + VERSAO_ATUAL);
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-v2.css?v=0.0.5">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
<header>
    <h2><i class="fas fa-cart-shopping"></i> A minha Lista</h2>
</header>

<div class="global-actions">
    <button class="share-all-btn" onclick="partilharTudo()">
        <i class="fas fa-share-nodes"></i> Partilhar todas as listas
    </button>
</div>
        <div id="folheto-conteudo"></div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-trash-can warning-icon"></i>
            <h3></h3>
            <p></p> 
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="fecharModal()">Não</button>
                <button class="btn-confirm" onclick="confirmarAcao()">Sim</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="app-v2.js?v=0.0.5"></script>
</body>
</html>
